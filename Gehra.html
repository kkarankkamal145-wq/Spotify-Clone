<!DOCTYPE html>

    <meta charset="UTF-8">

    <style>   
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}
body {
    background-color: #121212;
    color: white;
}
.main {
    width: 100%;
    padding: 30px;
}
.container1 {
    display: flex;
    gap: 30px;
    padding: 20px 0;
}
.image img {
    height: 230px;
    width: 230px;
    object-fit: cover;
    border-radius: 4px;
}
.song_name p {
    color: #b3b3b3;
    margin-bottom: 5px;
}
.song_name h1 {
    font-size: 60px;
    margin: 10px 0;
    font-weight: 800;
}
.container2-1 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 25px;
}
.icons i {
    font-size: 40px;
    margin-right: 25px;
    cursor: pointer;
}
.icons i:first-child {
    color: #1ed760; /* Spotify green play button */
    font-size: 60px;
}
.list {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #b3b3b3;
    cursor: pointer;
}
.list i {
    font-size: 22px;
}
.container2-2 {
    margin-top: 25px;
    padding: 10px 0;
    display: flex;
    justify-content: space-between;
    color: #b3b3b3;
    border-bottom: 1px solid #2b2b2b;
    margin-bottom: 10px;
}
.container3 {
    width: 100%;
}
.songs {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 0;
    border-radius: 5px;
    transition: background 0.2s;
    cursor: pointer;
}
.songs:hover {
    background-color: rgba(255, 255, 255, 0.1);
}
.songlist {
    display: flex;
    align-items: center;
    gap: 20px;
}
.songlist span {
    color: #b3b3b3;
    width: 20px;
}
.detail p:first-child {
    font-size: 16px;
    font-weight: 600;
    color: white;
}
.detail p:last-child {
    font-size: 14px;
    color: #b3b3b3;
}
.songs > span {
    color: #b3b3b3;
}
</style>
</head>

    <div class="main">
        <div class="container1">

            <div class="song_name">
                <p>Single</p>
                <h1>Gehra Hua (From "Dhurandhar")</h1>
                <p><b>Shashwat Sachdev • Arijit Singh • Irshad Kamil</b><span>• 2025 • 1 song, 6 min 2 sec</span></p>
            </div>
        </div>
        <div class="container2">
            <div class="container2-1">

                    </i>
                    <i class="bi bi-plus-circle"></i>

                </div>
                <div class="list">
                    <span>List</span>

                </div>
            </div>
            <br>
            <div class="container2-2">
                <div>#  Title</div>
                <div>
                    <i class="bi bi-clock"></i>
                    <i class="bi bi-caret-down-fill"></i>
                </div>
            </div>
        </div>
